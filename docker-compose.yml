services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: countries
      POSTGRES_PASSWORD: countries
      POSTGRES_DB: countries
    ports:
      - "5432:5432"
    volumes:
      - countries_pgdata:/var/lib/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U countries"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://countries:countries@db:5432/countries
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  countries_pgdata:
